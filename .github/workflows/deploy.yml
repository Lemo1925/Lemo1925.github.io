name: Deploy to GitHub Pages

on:
    push:
        branches: [master] # 设置在 main 分支推送时触发
    pull_request:
        branches: [master] # 可选：在PR时也运行构建（用于检查）
    workflow_dispatch: # 允许手动触发

# 设置 GITHUB_TOKEN 的权限，允许写入 Pages
permissions:
    contents: read
    pages: write
    id-token: write

# 允许一个并发部署
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22" # Astro 6.x 需要 Node.js >= 22.12.0
                  cache: "pnpm" # 如果您使用 pnpm

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install --frozen-lockfile # 或 npm ci

            - name: Build with Astro
              run: |
                  pnpm run build       # 执行 Astro 构建命令

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist # Astro 默认的构建输出目录

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
